<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DoorCTL</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23111113'/><rect x='25' y='10' width='50' height='80' rx='5' fill='%231a1a1e' stroke='%23f5a623' stroke-width='3'/><circle cx='65' cy='50' r='5' fill='%23f5a623'/></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="DoorCTL">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0f; --surface: #17171b; --surface2: #202027; --border: #2a2a34;
  --text: #f4f4f8; --muted: #6b6b80; --accent-work: #ffb02e; --accent-home: #5cc8ff;
  --open: #35d07f; --close: #ff5a56; --stop: #ffb02e;
  --shadow: 0 8px 24px rgba(0,0,0,.4); --shadow-sm: 0 2px 8px rgba(0,0,0,.25);
  --glow-work: 0 0 20px rgba(255,176,46,.15);
}
body.light {
  --bg: #f0f0f4; --surface: #ffffff; --surface2: #e9e9ef; --border: #dcdce4;
  --text: #16161a; --muted: #8a8a9a; --accent-work: #e08c00; --accent-home: #0091c7;
  --open: #1fa85f; --close: #e03b37; --stop: #e08c00;
  --shadow: 0 8px 24px rgba(0,0,0,.08); --shadow-sm: 0 2px 8px rgba(0,0,0,.05);
  --glow-work: 0 0 20px rgba(224,140,0,.1);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
body { background:var(--bg); font-family:'DM Mono',monospace; color:var(--text); min-height:100vh; max-width:420px; margin:0 auto; overflow-x:hidden; background-image:radial-gradient(circle at 50% 0%, rgba(255,176,46,.04), transparent 45%); background-attachment:fixed; }

/* LOGIN */
#loginScreen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 32px; z-index:100; transition:opacity .4s,transform .4s; background-image:radial-gradient(circle at 50% 30%, rgba(255,176,46,.06), transparent 50%); }
#loginScreen.hidden { opacity:0; transform:translateY(-20px); pointer-events:none; }
.login-logo { font-family:'Bebas Neue',sans-serif; font-size:56px; letter-spacing:8px; margin-bottom:4px; text-shadow:var(--glow-work); }
.login-sub { font-size:10px; color:var(--muted); letter-spacing:4px; text-transform:uppercase; margin-bottom:52px; }
.input-group { width:100%; margin-bottom:14px; }
.input-label { font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:7px; display:block; }
.input-field { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:15px 16px; color:var(--text); font-family:'DM Mono',monospace; font-size:14px; outline:none; transition:border-color .2s,box-shadow .2s; }
.input-field:focus { border-color:var(--accent-work); box-shadow:0 0 0 3px rgba(255,176,46,.1); }
.login-btn { width:100%; margin-top:8px; padding:17px; background:linear-gradient(135deg, var(--accent-work), #ff9500); color:#000; border:none; border-radius:12px; font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; cursor:pointer; transition:opacity .2s,transform .1s,box-shadow .2s; box-shadow:var(--glow-work); }
.login-btn:active { transform:scale(0.97); opacity:.9; }
.login-btn:disabled { opacity:.5; }
.login-err { margin-top:12px; font-size:11px; color:var(--close); text-align:center; min-height:16px; }

/* APP */
#app { opacity:0; transition:opacity .4s; pointer-events:none; }
#app.visible { opacity:1; pointer-events:all; }
.screen { display:none; }
.screen.active { display:block; animation:fadeUp .35s cubic-bezier(.16,1,.3,1); }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* TOPBAR */
.topbar { position:fixed; top:0; left:0; right:0; z-index:50; background:rgba(13,13,15,.82); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); max-width:420px; margin:0 auto; }
body.light .topbar { background:rgba(240,240,244,.82); }
.app-logo { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:4px; cursor:pointer; }
.topbar-right { display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
.icon-btn { font-size:9px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; cursor:pointer; padding:7px 11px; border:1px solid var(--border); border-radius:8px; transition:all .2s; background:var(--surface); }
.icon-btn:hover { color:var(--text); border-color:var(--text); }
.icon-btn.danger:hover { color:var(--close); border-color:var(--close); }
.icon-btn.active { color:var(--accent-work); border-color:var(--accent-work); box-shadow:var(--glow-work); }
.user-badge { font-size:9px; color:#e879c4; letter-spacing:1px; padding:7px 11px; border:1px solid rgba(232,121,196,.35); border-radius:8px; background:rgba(232,121,196,.08); text-shadow:0 0 12px rgba(232,121,196,.5); box-shadow:0 0 16px rgba(232,121,196,.12); }

/* LOCATION SWITCHER */
.loc-switcher { margin:20px 20px 0; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:5px; display:grid; grid-template-columns:1fr 1fr; gap:5px; box-shadow:var(--shadow-sm); }
.loc-btn { padding:13px; border-radius:10px; border:none; background:transparent; color:var(--muted); font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:2px; cursor:pointer; transition:all .25s; display:flex; align-items:center; justify-content:center; gap:6px; }
.loc-btn.active-work { background:linear-gradient(135deg, rgba(255,176,46,.12), rgba(255,176,46,.04)); color:var(--accent-work); box-shadow:0 0 0 1px rgba(255,176,46,.25); }
.loc-btn.active-home { background:linear-gradient(135deg, rgba(92,200,255,.12), rgba(92,200,255,.04)); color:var(--accent-home); box-shadow:0 0 0 1px rgba(92,200,255,.25); }

/* SECTION HEADER */
.section-header { padding:26px 20px 14px; display:flex; align-items:baseline; gap:10px; }
.section-title { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:2px; }
.section-count { font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }

/* DOOR CARDS */
.doors-list { padding:0 20px 40px; display:flex; flex-direction:column; gap:12px; }
.door-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; overflow:hidden; transition:border-color .3s,box-shadow .3s,transform .2s; box-shadow:var(--shadow-sm); }
.door-card:hover { box-shadow:var(--shadow); }
.door-top { padding:18px 18px 15px; display:flex; align-items:center; gap:14px; }
.door-num { font-family:'Bebas Neue',sans-serif; font-size:40px; line-height:1; color:var(--border); width:36px; flex-shrink:0; transition:color .3s,text-shadow .3s; }
.door-info { flex:1; }
.door-name { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; margin-bottom:4px; }
.door-status-badge { font-size:9px; letter-spacing:1px; padding:3px 9px; border-radius:20px; display:inline-block; margin-bottom:2px; font-weight:500; }
.status-online { background:rgba(53,208,127,.14); color:var(--open); border:1px solid rgba(53,208,127,.3); }
.status-offline { background:rgba(255,90,86,.14); color:var(--close); border:1px solid rgba(255,90,86,.3); }
.status-checking { background:rgba(255,176,46,.14); color:var(--stop); border:1px solid rgba(255,176,46,.3); }
.door-id { font-size:9px; color:var(--muted); letter-spacing:1px; }
.door-progress-wrap { height:4px; background:var(--border); margin:0 18px 15px; border-radius:3px; overflow:hidden; display:none; }
.door-progress-bar { height:100%; width:0%; border-radius:3px; transition:width .1s linear; }
.door-card.animating-open .door-progress-wrap { display:block; }
.door-card.animating-close .door-progress-wrap { display:block; }
.door-card.animating-open .door-progress-bar { background:var(--open); box-shadow:0 0 8px var(--open); }
.door-card.animating-close .door-progress-bar { background:var(--close); box-shadow:0 0 8px var(--close); }
.door-card.animating-open { border-color:rgba(53,208,127,.4); box-shadow:0 0 24px rgba(53,208,127,.12); }
.door-card.animating-close { border-color:rgba(255,90,86,.4); box-shadow:0 0 24px rgba(255,90,86,.12); }
.door-card.animating-open .door-num { color:var(--open); text-shadow:0 0 16px rgba(53,208,127,.5); }
.door-card.animating-close .door-num { color:var(--close); text-shadow:0 0 16px rgba(255,90,86,.5); }
.door-blocked { border-color:rgba(255,90,86,.25) !important; }
.door-num-online { color:var(--open) !important; text-shadow:0 0 14px rgba(53,208,127,.35); }
.door-num-offline { color:var(--muted) !important; }
.status-offline { background:rgba(107,107,128,.14) !important; color:var(--muted) !important; border:1px solid rgba(107,107,128,.3) !important; }
.door-controls { display:grid; grid-template-columns:1fr auto 1fr; gap:1px; background:var(--border); border-top:1px solid var(--border); }
.ctrl { background:var(--surface); border:none; padding:18px 10px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:7px; transition:background .15s,transform .1s; position:relative; overflow:hidden; }
.ctrl:active:not(:disabled) { transform:scale(0.95); }
.ctrl:disabled { opacity:.28; cursor:not-allowed; }
.ctrl-icon { font-size:22px; line-height:1; font-weight:bold; }
.ctrl-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; font-weight:500; }
.ctrl.open { background:linear-gradient(180deg, rgba(53,208,127,.08), var(--surface)); }
.ctrl.open:active:not(:disabled) { background:rgba(53,208,127,.2); }
.ctrl.open .ctrl-icon { color:var(--open); }
.ctrl.open .ctrl-label { color:var(--open); }
.ctrl.stop { background:var(--surface2); }
.ctrl.stop:active:not(:disabled) { background:rgba(255,176,46,.2); }
.ctrl.stop .ctrl-icon { color:var(--stop); font-size:16px; }
.ctrl.stop .ctrl-label { color:var(--stop); }
.ctrl.close { background:linear-gradient(180deg, rgba(255,90,86,.08), var(--surface)); }
.ctrl.close:active:not(:disabled) { background:rgba(255,90,86,.2); }
.ctrl.close .ctrl-icon { color:var(--close); }
.ctrl.close .ctrl-label { color:var(--close); }
.ripple-el { position:absolute; border-radius:50%; width:80px; height:80px; margin-top:-40px; margin-left:-40px; animation:rpl .5s ease-out forwards; pointer-events:none; }
.open .ripple-el { background:rgba(53,208,127,.25); }
.close .ripple-el { background:rgba(255,90,86,.25); }
.stop .ripple-el { background:rgba(255,176,46,.25); }
@keyframes rpl { from{transform:scale(0);opacity:1} to{transform:scale(2.5);opacity:0} }
.readonly-badge { display:none; margin:0 18px 15px; font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; text-align:center; padding:8px; border:1px dashed var(--border); border-radius:8px; }
.time-blocked-badge { margin:0 18px 15px; font-size:9px; color:var(--close); letter-spacing:1.5px; text-transform:uppercase; text-align:center; padding:8px; border:1px dashed rgba(255,90,86,.35); border-radius:8px; display:none; background:rgba(255,90,86,.04); }

/* ADMIN */
.admin-header { padding:26px 20px 8px; position:fixed; left:0; right:0; z-index:40; background:rgba(13,13,15,.97); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); max-width:420px; margin:0 auto; }
body.light .admin-header { background:rgba(240,240,244,.82); }
.admin-title { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:2px; margin-bottom:4px; }
.admin-sub { font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:18px; }
.admin-tabs { display:flex; gap:8px; padding:0 20px 18px; }
.admin-tab { flex:1; padding:12px; border:1px solid var(--border); border-radius:10px; background:var(--surface); color:var(--muted); font-family:'DM Mono',monospace; font-size:10px; cursor:pointer; transition:all .2s; text-transform:uppercase; letter-spacing:1px; }
.admin-tab.active { background:linear-gradient(135deg, rgba(255,176,46,.12), rgba(255,176,46,.04)); color:var(--accent-work); border-color:var(--accent-work); }
.users-list { padding:0 20px; display:flex; flex-direction:column; gap:9px; }
.user-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:15px 16px; display:flex; align-items:center; justify-content:space-between; box-shadow:var(--shadow-sm); }
.user-card-info { flex:1; }
.user-card-name { font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:1px; margin-bottom:3px; }
.user-card-meta { font-size:9px; color:var(--muted); letter-spacing:1px; }
.user-card-role { font-size:8px; letter-spacing:1px; padding:3px 9px; border-radius:20px; text-transform:uppercase; margin-left:8px; }
.role-admin { background:rgba(255,176,46,.14); color:var(--accent-work); border:1px solid rgba(255,176,46,.3); }
.role-operator { background:rgba(92,200,255,.14); color:var(--accent-home); border:1px solid rgba(92,200,255,.3); }
.role-readonly { background:rgba(107,107,128,.14); color:var(--muted); border:1px solid rgba(107,107,128,.3); }
.user-actions { display:flex; gap:6px; }
.user-edit-btn,.user-del-btn { width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:transparent; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.user-edit-btn { color:var(--accent-work); }
.user-edit-btn:hover { border-color:var(--accent-work); background:rgba(255,176,46,.08); }
.user-del-btn { color:var(--muted); }
.user-del-btn:hover { border-color:var(--close); color:var(--close); }
.add-user-btn { margin:18px 20px 40px; width:calc(100% - 40px); padding:16px; background:rgba(255,176,46,.05); border:1.5px dashed rgba(255,176,46,.4); border-radius:14px; color:var(--accent-work); font-family:'DM Mono',monospace; font-size:13px; font-weight:500; letter-spacing:.5px; cursor:pointer; transition:all .2s; }
.add-user-btn:hover { border-color:var(--accent-work); color:var(--accent-work); }

/* REMOTES SECTION */
.remotes-panel { padding:0 20px 40px; }
.remote-schedule-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px; margin-bottom:12px; box-shadow:var(--shadow-sm); }
.remote-schedule-title { font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:1px; margin-bottom:14px; }
.schedule-row { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.schedule-label { font-size:9px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; width:60px; flex-shrink:0; }
.schedule-input { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:9px 10px; color:var(--text); font-family:'DM Mono',monospace; font-size:12px; outline:none; width:60px; text-align:center; transition:border-color .2s; }
.schedule-input:focus { border-color:var(--accent-work); }
.days-grid { display:flex; gap:5px; flex-wrap:wrap; }
.day-btn { width:34px; height:34px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:9px; cursor:pointer; transition:all .2s; font-family:'DM Mono',monospace; }
.day-btn.selected { background:var(--accent-work); color:#000; border-color:var(--accent-work); box-shadow:var(--glow-work); }
.save-schedule-btn { width:100%; margin-top:14px; padding:14px; background:linear-gradient(135deg, var(--accent-work), #ff9500); color:#000; border:none; border-radius:12px; font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:2px; cursor:pointer; transition:transform .1s,opacity .2s; box-shadow:var(--glow-work); }
.save-schedule-btn:active { transform:scale(0.98); opacity:.9; }

/* HISTORY */
.history-header { padding:26px 20px 16px; position:fixed; left:0; right:0; z-index:40; background:rgba(13,13,15,.97); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-bottom:1px solid var(--border); max-width:420px; margin:0 auto; }
body.light .history-header { background:rgba(240,240,244,.82); }
.history-title { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:2px; margin-bottom:4px; }
.history-sub { font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }
.history-list { padding:0 20px 40px; display:flex; flex-direction:column; gap:7px; }
.log-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:13px 14px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:border-color .2s,background .2s; }
.log-card.selected { border-color:var(--accent-work); background:rgba(255,176,46,.08); }
.log-checkbox { width:18px; height:18px; border:1.5px solid var(--muted); border-radius:5px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; transition:all .2s; color:var(--text); }
.log-card.selected .log-checkbox { background:var(--accent-work); border-color:var(--accent-work); color:#000; }
.week-header { padding:6px 20px 6px; font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }
.log-action-badge { width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; }
.log-open { background:rgba(53,208,127,.14); color:var(--open); border:1px solid rgba(53,208,127,.3); }
.log-close { background:rgba(255,90,86,.14); color:var(--close); border:1px solid rgba(255,90,86,.3); }
.log-stop { background:rgba(255,176,46,.14); color:var(--stop); border:1px solid rgba(255,176,46,.3); }
.log-remote { background:rgba(155,89,182,.14); color:#b57ad6; border:1px solid rgba(155,89,182,.3); }
.log-info { flex:1; }
.log-door { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:1px; margin-bottom:2px; }
.log-user { font-size:10px; color:var(--accent-work); letter-spacing:1px; }
.log-time { font-size:9px; color:var(--muted); letter-spacing:1px; text-align:right; flex-shrink:0; }
.pass-wrap { position:relative; }
.pass-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:4px; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.72); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); z-index:200; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .3s; }
.modal-overlay.show { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:24px 24px 0 0; padding:26px 24px 40px; width:100%; max-width:420px; transform:translateY(100%); transition:transform .35s cubic-bezier(.175,.885,.32,1.275); max-height:90vh; overflow-y:auto; box-shadow:0 -8px 40px rgba(0,0,0,.4); }
.modal-overlay.show .modal { transform:translateY(0); }
.modal-title { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:2px; margin-bottom:22px; }
.modal-field { margin-bottom:14px; }
.modal-label { font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:7px; display:block; }
.modal-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:13px 14px; color:var(--text); font-family:'DM Mono',monospace; font-size:13px; outline:none; transition:border-color .2s,box-shadow .2s; }
.modal-input:focus { border-color:var(--accent-work); box-shadow:0 0 0 3px rgba(255,176,46,.1); }
.modal-select { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:13px 14px; color:var(--text); font-family:'DM Mono',monospace; font-size:13px; outline:none; }
.modal-btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:22px; }
.modal-btn { padding:15px; border-radius:12px; border:none; font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:2px; cursor:pointer; transition:opacity .2s,transform .1s; }
.modal-btn:active { opacity:.7; transform:scale(0.98); }
.modal-btn.cancel { background:var(--surface2); color:var(--muted); }
.modal-btn.confirm { background:linear-gradient(135deg, var(--accent-work), #ff9500); color:#000; }
.modal-btn:disabled { opacity:.5; }
.time-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

/* TOAST */
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface2); border:1px solid var(--border); border-radius:24px; padding:11px 22px; font-size:11px; letter-spacing:.5px; white-space:nowrap; z-index:999; transition:transform .35s cubic-bezier(.175,.885,.32,1.275); pointer-events:none; box-shadow:var(--shadow); }
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.t-open { border-color:var(--open); color:var(--open); }
.toast.t-close { border-color:var(--close); color:var(--close); }
.toast.t-stop { border-color:var(--stop); color:var(--stop); }
.toast.t-ok { border-color:var(--open); color:var(--open); }
.toast.t-err { border-color:var(--close); color:var(--close); }

<script>
// SUPABASE_URL, SUPABASE_KEY, and BLYNK_TOKENS are defined in config.js
// (gitignored — never committed). See config.example.js for the expected shape.
const BLYNK_PINS = { open:'V1', close:'V2', stop:'V3' };
const LOCATIONS = {
  work: { label:'Office', doors:[{id:'W1',name:'Loading Dock 1'},{id:'W2',name:'Loading Dock 2'},{id:'W3',name:'Loading Dock 3'},{id:'W4',name:'Loading Dock 4'}] }
};
const ANIM_DURATION = 32000;
let currentUser = null, currentLoc = 'work', editingUsername = null, animTimers = {};
let remoteSchedule = { startH:8, startM:0, endH:18, endM:0, days:'1,2,3,4,5' };

// ── THEME ──
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀️';
  localStorage.setItem('doorctl_theme', isLight ? 'light' : 'dark');
}

// ── PASS TOGGLE ──
function togglePass() {
  const inp = document.getElementById('newPassword');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  inp.nextElementSibling.textContent = inp.type === 'password' ? '👁' : '🙈';
}

// ── DAY TOGGLE ──
function toggleDay(btn, type) {
  btn.classList.toggle('selected');
}
function getSelectedDays(containerId) {
  return Array.from(document.querySelectorAll(`#${containerId} .day-btn.selected`)).map(b => b.dataset.day).join(',');
}
function setSelectedDays(containerId, daysStr) {
  const days = daysStr ? daysStr.split(',') : [];
  document.querySelectorAll(`#${containerId} .day-btn`).forEach(b => {
    b.classList.toggle('selected', days.includes(b.dataset.day));
  });
}

// ── TIME CHECK ──
function isTimeAllowed(startH, startM, endH, endM, allowedDays) {
  const now = new Date();
  const day = now.getDay().toString();
  const days = allowedDays ? allowedDays.split(',') : [];
  if (!days.includes(day)) return false;
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const startMins = (parseInt(startH)||0) * 60 + (parseInt(startM)||0);
  const endMins = (parseInt(endH)||23) * 60 + (parseInt(endM)||59);
  return nowMins >= startMins && nowMins < endMins;
}

function isUserAllowed() {
  if (!currentUser) return false;
  const sh = currentUser.start_hour, sm = currentUser.start_minute;
  const eh = currentUser.end_hour, em = currentUser.end_minute;
  const days = currentUser.allowed_days;
  if (sh === null || sh === undefined) return true; // no restriction
  return isTimeAllowed(sh, sm, eh, em, days);
}

// ── BIOMETRIC LOGIN (WebAuthn — real server-side signature verification) ──
const BIOMETRIC_KEY = 'doorctl_biometric';
const FUNC_URL = 'https://YOUR_PROJECT_REF.supabase.co/functions/v1/login';

// Convert an ArrayBuffer/TypedArray from the browser into the base64url
// string format the Edge Function (and @simplewebauthn/server) expects.
function bufToB64url(buf) {
  const bytes = new Uint8Array(buf);
  let bin = '';
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
// Convert a base64url string from the server back into an ArrayBuffer
// for navigator.credentials.create()/get().
function b64urlToBuf(str) {
  let b64 = str.replace(/-/g, '+').replace(/_/g, '/');
  while (b64.length % 4) b64 += '=';
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}

async function checkBiometricAvailable() {
  if (!window.PublicKeyCredential) return false;
  return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
}

async function registerBiometric(username) {
  try {
    // Step 1: ask the server for a one-time registration challenge
    const optResp = await fetch(`${FUNC_URL}/webauthn-register-options`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ username })
    });
    const options = await optResp.json();
    if (options.error) { console.log('Registration options failed:', options.error); return; }

    const publicKey = {
      ...options,
      challenge: b64urlToBuf(options.challenge),
      user: { ...options.user, id: b64urlToBuf(options.user.id) },
      excludeCredentials: (options.excludeCredentials || []).map(c => ({ ...c, id: b64urlToBuf(c.id) }))
    };

    const credential = await navigator.credentials.create({ publicKey });
    if (!credential) return;

    // Step 2: send the signed attestation back for verification
    const attestationResponse = {
      id: credential.id,
      rawId: bufToB64url(credential.rawId),
      type: credential.type,
      response: {
        clientDataJSON: bufToB64url(credential.response.clientDataJSON),
        attestationObject: bufToB64url(credential.response.attestationObject),
        transports: credential.response.getTransports ? credential.response.getTransports() : []
      },
      clientExtensionResults: credential.getClientExtensionResults ? credential.getClientExtensionResults() : {}
    };

    const verifyResp = await fetch(`${FUNC_URL}/webauthn-register-verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ username, response: attestationResponse })
    });
    const verifyData = await verifyResp.json();
    if (verifyData.ok) {
      localStorage.setItem(BIOMETRIC_KEY, JSON.stringify({ username }));
      localStorage.removeItem('doorctl_bio_offer');
      showToast('Fingerprint saved ✓', 't-ok');
    } else {
      console.log('Registration verify failed:', verifyData.error);
    }
  } catch(e) {
    // User cancelled — no error shown; registration will be offered again on next login
    console.log('Biometric cancelled:', e);
  }
}

async function biometricLogin() {
  const saved = JSON.parse(localStorage.getItem(BIOMETRIC_KEY) || 'null');
  if (!saved) return;
  try {
    // Step 1: ask the server for a fresh login challenge for this username
    const optResp = await fetch(`${FUNC_URL}/webauthn-login-options`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ username: saved.username })
    });
    const options = await optResp.json();
    if (options.error) {
      document.getElementById('loginErr').textContent = 'Biometric failed. Try password.';
      setTimeout(() => document.getElementById('loginErr').textContent = '', 2500);
      return;
    }

    const publicKey = {
      ...options,
      challenge: b64urlToBuf(options.challenge),
      allowCredentials: (options.allowCredentials || []).map(c => ({ ...c, id: b64urlToBuf(c.id) }))
    };

    const credential = await navigator.credentials.get({ publicKey });
    if (!credential) return;

    // Step 2: send the signed assertion back for verification
    const assertionResponse = {
      id: credential.id,
      rawId: bufToB64url(credential.rawId),
      type: credential.type,
      response: {
        clientDataJSON: bufToB64url(credential.response.clientDataJSON),
        authenticatorData: bufToB64url(credential.response.authenticatorData),
        signature: bufToB64url(credential.response.signature),
        userHandle: credential.response.userHandle ? bufToB64url(credential.response.userHandle) : undefined
      },
      clientExtensionResults: credential.getClientExtensionResults ? credential.getClientExtensionResults() : {}
    };

    const verifyResp = await fetch(`${FUNC_URL}/webauthn-login-verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ username: saved.username, response: assertionResponse })
    });
    const data = await verifyResp.json();
    if (data.user) {
      currentUser = data.user;
      saveSession(currentUser);
      if (data.token) localStorage.setItem('doorctl_token', data.token);
      loginSuccess();
    } else {
      document.getElementById('loginErr').textContent = 'Biometric failed. Try password.';
      setTimeout(() => document.getElementById('loginErr').textContent = '', 2500);
    }
  } catch(e) {
    document.getElementById('loginErr').textContent = 'Biometric failed. Try password.';
    setTimeout(() => document.getElementById('loginErr').textContent = '', 2500);
  }
}

// ── SUPABASE ──
async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: { 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}`, 'Content-Type':'application/json', 'Prefer':'return=representation', ...(opts.headers||{}) }
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// ── ONLINE STATUS ──
const doorStatus = {};
async function checkDoorOnline(doorId) {
  const token = BLYNK_TOKENS[doorId];
  if (!token) return;

  try {
    const el = document.getElementById('status-' + doorId);
    if (el) { el.className = 'door-status-badge status-checking'; el.textContent = '● Checking'; }
    const res = await fetch(`https://blynk.cloud/external/api/isHardwareConnected?token=${token}`);
    const online = await res.json();
    doorStatus[doorId] = online;
    if (el) {
      el.className = 'door-status-badge ' + (online ? 'status-online' : 'status-offline');
      el.textContent = online ? '● Online' : '● Offline';
    }
    // Door number color
    const numEl = document.getElementById('num-' + doorId);
    if (numEl) numEl.className = 'door-num ' + (online ? 'door-num-online' : 'door-num-offline');
    const card = document.getElementById('card-' + doorId);
    if (card) {
      const btns = card.querySelectorAll('.ctrl');
      const isReadOnly = currentUser.role === 'read_only';
      const allowed = isUserAllowed();
      btns.forEach(btn => { btn.disabled = isReadOnly || !allowed || !online; });
      if (!online) card.classList.add('door-blocked');
      else if (allowed && !isReadOnly) card.classList.remove('door-blocked');
    }
  } catch(e) {
    doorStatus[doorId] = false;
    const el = document.getElementById('status-' + doorId);
    if (el) { el.className = 'door-status-badge status-offline'; el.textContent = '● Offline'; }
    const numEl = document.getElementById('num-' + doorId);
    if (numEl) numEl.className = 'door-num door-num-offline';
    const card = document.getElementById('card-' + doorId);
    if (card) {
      card.querySelectorAll('.ctrl').forEach(btn => btn.disabled = true);
      card.classList.add('door-blocked');
    }
  }
}

      <div class="door-top">

        <div class="door-info">

      ${!isReadOnly && !allowed ? '<div class="time-blocked-badge" style="display:block">⏰ ACCESS RESTRICTED — Outside allowed hours</div>' : ''}

// ── ANIMATION ──
function startAnim(doorId, action) {
  stopAnim(doorId);
  const card = document.getElementById('card-'+doorId);
  const prog = document.getElementById('prog-'+doorId);
  const cls = action==='open'?'animating-open':'animating-close';
  card.classList.add(cls);
  let pct = 0;
  const interval = setInterval(() => { pct = Math.min(pct + 100/(ANIM_DURATION/100), 100); prog.style.width = pct+'%'; }, 100);
  const timeout = setTimeout(() => stopAnimVisual(doorId), ANIM_DURATION);
  animTimers[doorId] = { interval, timeout, cls };
}
// Visual-only stop — does not clear the pending doneToast timer
function stopAnimVisual(doorId) {
  if (!animTimers[doorId]) return;
  clearInterval(animTimers[doorId].interval);
  clearTimeout(animTimers[doorId].timeout);
  const card = document.getElementById('card-'+doorId);
  const prog = document.getElementById('prog-'+doorId);
  if (card) card.classList.remove('animating-open','animating-close');
  if (prog) prog.style.width = '0%';
  delete animTimers[doorId];
}
function stopAnim(doorId) {
  if (!animTimers[doorId]) return;
  clearInterval(animTimers[doorId].interval);
  clearTimeout(animTimers[doorId].timeout);
  clearTimeout(animTimers[doorId].doneToast);
  const card = document.getElementById('card-'+doorId);
  const prog = document.getElementById('prog-'+doorId);
  if (card) card.classList.remove('animating-open','animating-close');
  if (prog) prog.style.width = '0%';
  delete animTimers[doorId];
}

// ── SEND CMD ──
async function sendCmd(doorId, action, e) {
  if (currentUser.role === 'read_only' || !isUserAllowed()) {
    showToast('Access restricted', 't-err');
    return;
  }
  const btn = e.currentTarget;
  const r = document.createElement('span'); r.className = 'ripple-el';
  const rect = btn.getBoundingClientRect();
  r.style.left = (e.clientX-rect.left)+'px'; r.style.top = (e.clientY-rect.top)+'px';
  btn.appendChild(r); setTimeout(() => r.remove(), 500);
  if (action==='stop') {
    if (animTimers[doorId] && animTimers[doorId].cls === 'animating-open') {
      showToast("Stop isn't possible during opening", 't-err');
      return;
    }
    stopAnim(doorId);
    showToast('■ Stopped', 't-stop');
    // Send the Stop pulse to Blynk
    try {
      const token = BLYNK_TOKENS[doorId];
      if (token) {
        await fetch(`https://blynk.cloud/external/api/update?token=${token}&V3=1`);
        setTimeout(() => fetch(`https://blynk.cloud/external/api/update?token=${token}&V3=0`), 500);
      }
    } catch(err) {}
    try {
      const doorName = LOCATIONS[currentLoc].doors.find(d => d.id===doorId)?.name || doorId;
      await sbFetch('logs', { method:'POST', body:JSON.stringify({ username:currentUser.username, door_id:doorId, door_name:doorName, action:'stop', location:currentLoc }) });
    } catch(err) {}
    return;

  } else if (action==='open') {
    // Already opening — just remind the user
    if (animTimers[doorId] && animTimers[doorId].cls === 'animating-open') {
      showToast('↑ Door is Opening...', 't-open');
      return;
    }
    // Closing in progress — stop it and open instead
    if (animTimers[doorId] && animTimers[doorId].cls === 'animating-close') {
      stopAnim(doorId);
    }
    startAnim(doorId, 'open');
    showToast('↑ Door is Opening...', 't-open');
    const openDone = setTimeout(() => showToast('✓ Door Opened', 't-ok'), ANIM_DURATION);
    if (animTimers[doorId]) animTimers[doorId].doneToast = openDone;

  } else {
    // close
    if (animTimers[doorId] && animTimers[doorId].cls === 'animating-open') {
      showToast("Close isn't possible during opening", 't-err');
      return;
    }
    // Already closing — just remind the user
    if (animTimers[doorId] && animTimers[doorId].cls === 'animating-close') {
      showToast('↓ Door is Closing...', 't-close');
      return;
    }
    startAnim(doorId, 'close');
    showToast('↓ Door is Closing...', 't-close');
    const closeDone = setTimeout(() => showToast('✓ Door Closed', 't-close'), ANIM_DURATION);
    if (animTimers[doorId]) animTimers[doorId].doneToast = closeDone;
  }
  try {
    const token = BLYNK_TOKENS[doorId];
    if (token) {
      const pin = BLYNK_PINS[action];
      await fetch(`https://blynk.cloud/external/api/update?token=${token}&${pin}=1`);
      setTimeout(() => fetch(`https://blynk.cloud/external/api/update?token=${token}&${pin}=0`), 500);
    }
  } catch(err) {}
  try {
    const doorName = LOCATIONS[currentLoc].doors.find(d => d.id===doorId)?.name || doorId;
    await sbFetch('logs', { method:'POST', body:JSON.stringify({ username:currentUser.username, door_id:doorId, door_name:doorName, action, location:currentLoc }) });
  } catch(err) {}
}

    const icons = { open:'↑', close:'↓', stop:'■' };
    const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
    const remoteSVG = `<svg viewBox="0 0 200 320" width="16" height="26" style="display:block"><defs><linearGradient id="rb" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#9B6B3A"/><stop offset="100%" style="stop-color:#5C3210"/></linearGradient><radialGradient id="rbn" cx="38%" cy="32%" r="65%"><stop offset="0%" style="stop-color:#FF8FA8"/><stop offset="100%" style="stop-color:#8C1830"/></radialGradient></defs><path d="M58,55 Q52,55 44,85 L40,200 Q39,240 44,260 Q52,278 100,280 Q148,278 156,260 Q161,240 160,200 L156,85 Q148,55 142,55 Z" fill="url(#rb)"/><circle cx="100" cy="108" r="18" fill="url(#rbn)"/><polygon points="100,97 109,117 91,117" fill="white" opacity="0.95"/><circle cx="130" cy="138" r="18" fill="url(#rbn)"/><polygon points="120,129 140,138 120,147" fill="white" opacity="0.95"/><circle cx="100" cy="168" r="18" fill="url(#rbn)"/><rect x="91" y="159" width="18" height="18" rx="2.5" fill="white" opacity="0.95"/><circle cx="70" cy="138" r="18" fill="url(#rbn)"/><polygon points="80,129 60,138 80,147" fill="white" opacity="0.95"/></svg>`;
    const groups = {};
    logs.forEach(l => {
      const d = new Date(l.created_at);
      const weekStart = new Date(d);
      weekStart.setDate(d.getDate() - d.getDay());
      const key = weekStart.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
      if (!groups[key]) groups[key] = [];
      groups[key].push(l);
    });

    let html = '';
    Object.entries(groups).forEach(([week, items]) => {
      html += `<div class="week-header">Week of ${week}</div>`;
      items.forEach(l => {
        const d = new Date(l.created_at);
        const date = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
        const time = d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        const isRemote = l.username === 'remote';
        const isButtonStop = l.username === 'Button Stop';
        const logId = l.id;
        const actionLabel = isRemote
          ? `Remote · ${cap(l.action)}`
          : isButtonStop
            ? l.username
            : `${l.username} · ${cap(l.action)}`;
        const badgeIcon = isRemote ? remoteSVG : (isButtonStop ? '●' : (icons[l.action]||'·'));
        html += `<div class="log-card" id="log-${logId}" onclick="${currentUser.role === 'admin' ? `toggleLogSelect('${logId}')` : ''}">
          <div class="log-checkbox" id="check-${logId}" style="${currentUser.role !== 'admin' ? 'display:none' : ''}"></div>
          <div class="log-action-badge log-${l.action}">${badgeIcon}</div>
          <div class="log-info">
            <div class="log-door">${l.door_name}</div>
            <div class="log-user">${actionLabel}</div>
          </div>
          <div class="log-time">${date}<br>${time}</div>
        </div>`;
      });
    });
    list.innerHTML = html;

    // 10,000-row limit — purge the oldest entries first
    if (logs.length >= 10000) {
      const oldest = logs[logs.length - 1];
      await fetch('https://YOUR_PROJECT_REF.supabase.co/functions/v1/login/delete-logs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}`, 'X-Doorctl-Token': localStorage.getItem('doorctl_token') },
        body: JSON.stringify({ beforeDate: oldest.created_at })
      });
    }
  } catch(e) { list.innerHTML = '<div class="empty-state">Error loading history</div>'; }
}

function toggleLogSelect(logId) {
  const card = document.getElementById('log-' + logId);
  const check = document.getElementById('check-' + logId);
  if (selectedLogs.has(logId)) {
    selectedLogs.delete(logId);
    card.classList.remove('selected');
    check.textContent = '';
  } else {
    selectedLogs.add(logId);
    card.classList.add('selected');
    check.textContent = '✓';
  }
  updateDeleteBtn();
}

function toggleSelectAll() {
  const cards = document.querySelectorAll('.log-card');
  const allSelected = selectedLogs.size === cards.length;
  cards.forEach(card => {
    const logId = card.id.replace('log-', '');
    const check = document.getElementById('check-' + logId);
    if (allSelected) {
      selectedLogs.delete(logId);
      card.classList.remove('selected');
      check.textContent = '';
    } else {
      selectedLogs.add(logId);
      card.classList.add('selected');
      check.textContent = '✓';
    }
  });
  document.getElementById('selectAllBtn').textContent = allSelected ? '☐ Select All' : '☑ Deselect All';
  updateDeleteBtn();
}

function updateDeleteBtn() {
  const btn = document.getElementById('deleteBtn');
  if (btn) btn.style.display = selectedLogs.size > 0 ? 'block' : 'none';
}

async function deleteSelected() {
  if (!selectedLogs.size) return;
  if (!confirm(`Delete ${selectedLogs.size} selected log${selectedLogs.size>1?'s':''}?\nThis cannot be undone.`)) return;
  try {
    const ids = Array.from(selectedLogs);
    await fetch('https://YOUR_PROJECT_REF.supabase.co/functions/v1/login/delete-logs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}`, 'X-Doorctl-Token': localStorage.getItem('doorctl_token') },
      body: JSON.stringify({ ids })
    });
    showToast(`${selectedLogs.size} logs deleted`, 't-ok');
    loadHistory();
  } catch(e) { showToast('Error deleting', 't-err'); }
}

// ── REMOTE SCHEDULE ──
function loadRemoteScheduleUI() {
  function from24h(h) {
    const ampm = h >= 12 ? 'pm' : 'am';
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return { h12, ampm };
  }
  const sh = from24h(remoteSchedule.startH ?? 8);
  const eh = from24h(remoteSchedule.endH ?? 18);
  document.getElementById('remoteStartH').value = String(sh.h12).padStart(2,'0');
  document.getElementById('remoteStartM').value = String(remoteSchedule.startM ?? 0).padStart(2,'0');
  document.getElementById('remoteStartAmpm').value = sh.ampm;
  document.getElementById('remoteEndH').value = String(eh.h12).padStart(2,'0');
  document.getElementById('remoteEndM').value = String(remoteSchedule.endM ?? 0).padStart(2,'0');
  document.getElementById('remoteEndAmpm').value = eh.ampm;
  setSelectedDays('remoteDays', remoteSchedule.days);
}

async function saveRemoteSchedule() {
  function to24h(h, ampm) {
    h = parseInt(h);
    if (isNaN(h)) return 0;
    if (ampm === 'am') return h === 12 ? 0 : h;
    return h === 12 ? 12 : h + 12;
  }
  const startH = to24h(document.getElementById('remoteStartH').value, document.getElementById('remoteStartAmpm').value);
  const startM = parseInt(document.getElementById('remoteStartM').value)||0;
  const endH = to24h(document.getElementById('remoteEndH').value, document.getElementById('remoteEndAmpm').value);
  const endM = parseInt(document.getElementById('remoteEndM').value)||0;
  remoteSchedule = { startH, startM, endH, endM, days: getSelectedDays('remoteDays') };
  localStorage.setItem('doorctl_remote_schedule', JSON.stringify(remoteSchedule));
  // V7=Start Hour, V8=Start Min, V9=End Hour, V10=End Min, V11=Days
  try {
    const token = BLYNK_TOKENS['W1'];
    await fetch(`https://blynk.cloud/external/api/update?token=${token}&V7=${startH}`);
    await fetch(`https://blynk.cloud/external/api/update?token=${token}&V8=${startM}`);
    await fetch(`https://blynk.cloud/external/api/update?token=${token}&V9=${endH}`);
    await fetch(`https://blynk.cloud/external/api/update?token=${token}&V10=${endM}`);
    await fetch(`https://blynk.cloud/external/api/update?token=${token}&V11=${encodeURIComponent(remoteSchedule.days)}`);
  } catch(e) {}
  showToast('Schedule saved ✓', 't-ok');
}

// ── ROLE POLLING ──
// Keeps currentUser.role/schedule fresh in the background so an admin's
// change takes effect within ~10s, without adding any delay to button presses.
let rolePollTimer = null;
function startRolePolling() {
  stopRolePolling();
  rolePollTimer = setInterval(async () => {
    if (!currentUser) return;
    try {
      const resp = await fetch(`${FUNC_URL}/get-users`, {
        headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }
      });
      const users = await resp.json();
      const me = Array.isArray(users) ? users.find(u => u.username === currentUser.username) : null;
      if (me) {
        // Re-render only if something relevant actually changed — otherwise
        // this would wipe the doors screen (and interrupt in-progress
        // open/close animations) every 10 seconds for nothing.
        const watched = ['role','start_hour','end_hour','start_minute','end_minute','allowed_days','locations'];
        const changed = watched.some(k => JSON.stringify(currentUser[k]) !== JSON.stringify(me[k]));
        currentUser = { ...currentUser, ...me };
        saveSession(currentUser);
        if (changed && currentScreen === 'doors') renderDoors();
      }
    } catch(err) { /* transient network issue — try again on the next tick */ }
  }, 10000);
}
function stopRolePolling() {
  if (rolePollTimer) { clearInterval(rolePollTimer); rolePollTimer = null; }
}

// ── USERS ──
async function loadUsers() {
  const list = document.getElementById('usersList');
  list.innerHTML = '<div class="empty-state">Loading...</div>';
  try {
    const resp = await fetch('https://YOUR_PROJECT_REF.supabase.co/functions/v1/login/get-users', {
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }
    });
    const users = await resp.json();
    const roleClass = { admin:'role-admin', operator:'role-operator', user:'role-operator', read_only:'role-readonly' };
    const roleLabel = { admin:'Admins', operator:'Operators', user:'Operators', read_only:'Read Only' };
    const groups = { admin:[], operator:[], user:[], read_only:[] };
    users.forEach(u => (groups[u.role]||groups['user']).push(u));
    let html = '';
    ['admin','operator','user','read_only'].forEach(role => {
      if (!groups[role].length) return;
      html += `<div style="padding:6px 0 4px;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;">${roleLabel[role]}</div>`;
      groups[role].forEach(u => {
        const sh = u.start_hour !== null && u.start_hour !== undefined;
        function fmt12(h, m) {
          const ampm = h >= 12 ? 'PM' : 'AM';
          const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
          return `${h12}:${String(m||0).padStart(2,'0')} ${ampm}`;
        }
        const timeInfo = sh ? `${fmt12(u.start_hour, u.start_minute)} - ${fmt12(u.end_hour||23, u.end_minute)}` : 'No time limit';
        html += `<div class="user-card">
          <div class="user-card-info">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <div class="user-card-name">${u.username}</div>
              <span class="user-card-role ${roleClass[u.role]||'role-operator'}">${u.role}</span>
            </div>
            <div class="user-card-meta" style="display:flex;align-items:center;gap:6px">
              <span>${u.locations||'no access'}</span>
              <span id="pass-${u.username}" style="display:none;color:var(--accent-work);font-size:10px">· ${u.password}</span>
            </div>
            <div style="font-size:9px;color:var(--muted);margin-top:2px">⏰ ${timeInfo}</div>
          </div>
          <div class="user-actions">
            <button class="user-edit-btn" onclick="togglePassword('${u.username}')" title="Show password">👁</button>
            <button class="user-edit-btn" onclick='openEditUser(${JSON.stringify(u)})'>✏️</button>
            ${u.username!==currentUser.username?`<button class="user-del-btn" onclick="deleteUser('${u.username}')">✕</button>`:''}
          </div>
        </div>`;
      });
      html += `<div style="height:1px;background:var(--border);margin:8px 0;"></div>`;
    });
    list.innerHTML = html;
  } catch(e) { list.innerHTML = '<div class="empty-state">Error</div>'; }
}

async function togglePassword(username) {
  const el = document.getElementById('pass-'+username);
  if (!el) return;
  if (el.style.display !== 'none') { el.style.display = 'none'; return; }
  if (el.dataset.loaded) { el.style.display = 'inline'; return; }
  try {
    const resp = await fetch('https://YOUR_PROJECT_REF.supabase.co/functions/v1/login/get-password', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'X-Doorctl-Token': localStorage.getItem('doorctl_token') },
      body: JSON.stringify({ username })
    });
    const data = await resp.json();
    el.textContent = `· ${data.password}`;
    el.dataset.loaded = '1';
    el.style.display = 'inline';
  } catch(e) { showToast('Error loading password','t-err'); }
}

async function deleteUser(username) {
  if (!confirm(`Delete "${username}"?`)) return;
  try {
    const resp = await fetch('https://YOUR_PROJECT_REF.supabase.co/functions/v1/login/save-user', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'X-Doorctl-Token': localStorage.getItem('doorctl_token') },
      body: JSON.stringify({ action: 'delete', username })
    });
    if (!resp.ok) throw new Error();
    showToast(`${username} deleted`,'t-ok'); loadUsers();
  } catch(e) { showToast('Error','t-err'); }
}

function openAddUser() {
  editingUsername = null;
  document.getElementById('modalTitle').textContent = 'New User';
  document.getElementById('newUsername').value = '';
  document.getElementById('newUsername').disabled = false;
  document.getElementById('newPassword').value = '';
  document.getElementById('newRole').value = 'user';
  document.getElementById('newLocations').value = 'work,home';
  document.getElementById('newStartH').value = '08';
  document.getElementById('newStartM').value = '00';
  document.getElementById('newStartAmpm').value = 'am';
  document.getElementById('newEndH').value = '06';
  document.getElementById('newEndM').value = '00';
  document.getElementById('newEndAmpm').value = 'pm';
  setSelectedDays('userDays', '1,2,3,4,5');
  document.getElementById('modalOverlay').classList.add('show');
}

async function openEditUser(u) {
  editingUsername = u.username;
  document.getElementById('modalTitle').textContent = 'Edit User';
  document.getElementById('newUsername').value = u.username;
  document.getElementById('newUsername').disabled = true;
  document.getElementById('newPassword').value = '';
  // Fetch the password from the Edge Function
  try {
    const resp = await fetch('https://YOUR_PROJECT_REF.supabase.co/functions/v1/login/get-password', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'X-Doorctl-Token': localStorage.getItem('doorctl_token') },
      body: JSON.stringify({ username: u.username })
    });
    const data = await resp.json();
    document.getElementById('newPassword').value = data.password || '';
  } catch(e) {}
  document.getElementById('newRole').value = u.role;
  document.getElementById('newLocations').value = u.locations || 'work';
  // Convert 24h to 12h for display
  function from24h(h) {
    if (h === null || h === undefined) return { h12: '08', ampm: 'am' };
    const ampm = h >= 12 ? 'pm' : 'am';
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return { h12, ampm };
  }
  const sh = from24h(u.start_hour), eh = from24h(u.end_hour);
  document.getElementById('newStartH').value = String(sh.h12).padStart(2,'0');
  document.getElementById('newStartM').value = String(u.start_minute !== null && u.start_minute !== undefined ? u.start_minute : 0).padStart(2,'0');
  document.getElementById('newStartAmpm').value = sh.ampm;
  document.getElementById('newEndH').value = String(eh.h12).padStart(2,'0');
  document.getElementById('newEndM').value = String(u.end_minute !== null && u.end_minute !== undefined ? u.end_minute : 0).padStart(2,'0');
  document.getElementById('newEndAmpm').value = eh.ampm;
  setSelectedDays('userDays', u.allowed_days || '1,2,3,4,5');
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); editingUsername = null; }

async function saveUser() {
  const username = editingUsername || document.getElementById('newUsername').value.trim();
  const password = document.getElementById('newPassword').value;
  const role = document.getElementById('newRole').value;
  const locations = document.getElementById('newLocations').value;
  const startH12 = parseInt(document.getElementById('newStartH').value);
  const startM = document.getElementById('newStartM').value;
  const startAmpm = document.getElementById('newStartAmpm').value;
  const endH12 = parseInt(document.getElementById('newEndH').value);
  const endM = document.getElementById('newEndM').value;
  const endAmpm = document.getElementById('newEndAmpm').value;
  const days = getSelectedDays('userDays');

  // Convert 12h to 24h
  function to24h(h, ampm) {
    if (ampm === 'am') return h === 12 ? 0 : h;
    return h === 12 ? 12 : h + 12;
  }
  const startH = isNaN(startH12) ? null : to24h(startH12, startAmpm);
  const endH = isNaN(endH12) ? null : to24h(endH12, endAmpm);
  if (!username) { showToast('Enter username','t-err'); return; }
  if (!editingUsername && !password) { showToast('Enter password','t-err'); return; }
  if (password && password.length < 6) { showToast('Password must be at least 6 characters','t-err'); return; }
  const btn = document.getElementById('saveUserBtn'); btn.disabled = true;
  try {
    const data = { role, locations, allowed_days:days };
    if (startH !== '') { data.start_hour = parseInt(startH); data.start_minute = parseInt(startM)||0; }
    if (endH !== '') { data.end_hour = parseInt(endH); data.end_minute = parseInt(endM)||0; }
    if (password) data.password = password;
    if (editingUsername) {
      const resp = await fetch('https://YOUR_PROJECT_REF.supabase.co/functions/v1/login/save-user', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'X-Doorctl-Token': localStorage.getItem('doorctl_token') },
        body: JSON.stringify({ action: 'update', username: editingUsername, data })
      });
      if (!resp.ok) throw new Error();
      showToast(`${username} updated ✓`,'t-ok');
      // If editing my own account, refresh currentUser too
      if (editingUsername === currentUser.username) {
        currentUser = { ...currentUser, ...data };
        saveSession(currentUser);
      }
    } else {
      data.username = username;
      const resp = await fetch('https://YOUR_PROJECT_REF.supabase.co/functions/v1/login/save-user', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'X-Doorctl-Token': localStorage.getItem('doorctl_token') },
        body: JSON.stringify({ action: 'create', data })
      });
      if (!resp.ok) throw new Error();
      showToast(`${username} added ✓`,'t-ok');
    }
    closeModal(); loadUsers();
  } catch(e) { showToast('Error','t-err'); }
  btn.disabled = false;
}

// ── AUTO PAD TIME INPUTS ──
document.addEventListener('DOMContentLoaded', () => {
  const timeInputIds = ['newStartH','newStartM','newEndH','newEndM','remoteStartH','remoteStartM','remoteEndH','remoteEndM'];
  timeInputIds.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('blur', () => {
      if (el.value !== '') el.value = String(parseInt(el.value)||0).padStart(2,'0');
    });
  });
});
let toastTimer;
function showToast(msg, cls) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${cls} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
